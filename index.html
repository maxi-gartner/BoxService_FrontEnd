<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>BoxService — Dashboard</title>
    <link rel="stylesheet" href="css/main.css" />
  </head>
  <body>
    <nav class="navbar">
      <span class="navbar-brand">⚙ BoxService</span>
      <ul class="navbar-links">
        <li><a href="index.html" class="active">Dashboard</a></li>
        <li><a href="pages/clientes.html">Clientes</a></li>
        <li><a href="pages/vehiculos.html">Vehículos</a></li>
        <li><a href="pages/services.html">Services</a></li>
        <li><a href="pages/presupuestos.html">Presupuestos</a></li>
        <li><a href="pages/facturas.html">Facturas</a></li>
      </ul>
      <span id="health-indicator" class="text-muted text-sm"
        >Verificando servidor...</span
      >
    </nav>

    <div class="container">
      <h1 class="page-title">Dashboard</h1>

      <div id="alert-box" class="alert"></div>

      <!-- Cards de estado del sistema -->
      <div class="form-row mb-6">
        <div class="card">
          <p class="text-muted">Estado del servidor</p>
          <p id="status-server" class="text-xl mt-4" style="font-weight: 700">
            —
          </p>
        </div>
        <div class="card">
          <p class="text-muted">Base de datos</p>
          <p id="status-db" class="text-xl mt-4" style="font-weight: 700">—</p>
        </div>
        <div class="card">
          <p class="text-muted">Versión</p>
          <p id="status-version" class="text-xl mt-4" style="font-weight: 700">
            —
          </p>
        </div>
      </div>

      <!-- Accesos rápidos -->
      <div class="card">
        <p class="card-title">Accesos rápidos</p>
        <div class="flex gap-4" style="flex-wrap: wrap">
          <a href="pages/clientes.html" class="btn btn-secondary"
            >👤 Clientes</a
          >
          <a href="pages/vehiculos.html" class="btn btn-secondary"
            >🚗 Vehículos</a
          >
          <a href="pages/services.html" class="btn btn-secondary"
            >🔧 Services</a
          >
          <a href="pages/presupuestos.html" class="btn btn-primary"
            >📋 Nuevo Presupuesto</a
          >
          <a href="pages/facturas.html" class="btn btn-secondary"
            >🧾 Facturas</a
          >
        </div>
      </div>
    </div>

    <script type="module">
      import { getHealth } from "./js/api.js";

      async function checkHealth() {
        const res = await getHealth();
        const indicator = document.getElementById("health-indicator");

        if (res.success) {
          indicator.textContent = "● Online";
          indicator.style.color = "#6EE7B7";
          document.getElementById("status-server").textContent =
            res.data.status;
          document.getElementById("status-server").style.color = "#6EE7B7";
          document.getElementById("status-db").textContent = res.data.database;
          document.getElementById("status-db").style.color =
            res.data.database === "connected" ? "#6EE7B7" : "#FCA5A5";
          document.getElementById("status-version").textContent =
            res.data.version;
        } else {
          indicator.textContent = "● Offline";
          indicator.style.color = "#EF4444";
        }
      }

      checkHealth();
    </script>
  </body>
</html>
